<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plumbing Materials Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">PlumbTech</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About Us</a>
            <a href="#">Contact Us</a>
            <a href="#">Cart (0)</a>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="hero-content">
            <h1>Quality Plumbing Materials</h1>
            <p>Durable plumbing products for homes and industries</p>
        </div>
        
        <div class="small-categories-container">
            <button class="category-btn">Pipes</button>
            <button class="category-btn">Water Tanks</button>
            <button class="category-btn">Faucets</button>
            <button class="category-btn">PVC Fittings</button>
        </div>

        <div class="shop-now-wrapper">
            <button class="shop-now-btn">Shop Now</button>
        </div>
    </header>

    <section class="featured-products">
        <h2>Featured Products</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-img-placeholder">⭕</div>
                <h3>PVC Pipe</h3>
                <p>Strong and durable pipe for plumbing.</p>
                <span class="price">₦15,000</span>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-img-placeholder">⭕</div>
                <h3>PVC Pipe</h3>
                <p>Strong and durable pipe for plumbing.</p>
                <span class="price">₦15,000</span>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>

        </div>
    </section>

</body>
</html>
